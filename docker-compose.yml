services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: urjakavach
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: urjakavach
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urjakavach -d urjakavach"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  api:
    build: ./api
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./api/app:/app/app
      - ./api/tests:/app/tests
      - ./data:/app/data:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  web:
    build: ./web
    env_file: .env
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./web/src:/app/src
    command: npm run dev -- --force --host 0.0.0.0
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

volumes:
  pgdata:
